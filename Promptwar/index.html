<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" 
        content="default-src 'self'; 
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
               font-src https://fonts.gstatic.com; 
               img-src 'self' data:; 
               script-src 'self' https://www.gstatic.com https://www.googletagmanager.com https://www.google-analytics.com;
               connect-src 'self' https://www.google-analytics.com https://firebaseinstallations.googleapis.com https://firebase.googleapis.com https://firebaselogging-pa.googleapis.com;
               worker-src 'self';
               manifest-src 'self';">

  <!-- Referrer Policy -->
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- SEO -->
  <title>CivicGuide AI — Your Personal Voting Assistant</title>
  <meta name="description" content="CivicGuide AI is a free, non-partisan voting assistant that creates personalized step-by-step voting timelines for every US state. Get registered, know your deadlines, and vote with confidence.">
  <meta name="keywords" content="voter registration, voting guide, election 2026, civic guide, voting assistant, election deadlines, midterm elections">
  <meta name="author" content="CivicGuide AI">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0a0a1a">

  <!-- Open Graph -->
  <meta property="og:title" content="CivicGuide AI — Your Personal Voting Assistant">
  <meta property="og:description" content="Free, non-partisan voting guide with personalized timelines for every US state.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://civicguide-ai-election.web.app">
  <meta property="og:site_name" content="CivicGuide AI">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="CivicGuide AI — Your Personal Voting Assistant">
  <meta name="twitter:description" content="Free, non-partisan voting guide with personalized timelines for every US state.">

  <!-- Structured Data (JSON-LD) for Google Search -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "CivicGuide AI",
    "alternateName": "CivicGuide AI — Your Personal Voting Assistant",
    "url": "https://civicguide-ai-election.web.app",
    "description": "Free, non-partisan voting assistant with personalized step-by-step timelines for voter registration, mail-in ballots, early voting, and Election Day across all 50 US states and DC.",
    "applicationCategory": "GovernmentApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "creator": {
      "@type": "Organization",
      "name": "CivicGuide AI"
    },
    "inLanguage": "en-US",
    "isAccessibleForFree": true,
    "browserRequirements": "Requires JavaScript"
  }
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="apple-touch-icon" href="assets/favicon.svg">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Performance: Preconnect to Google Fonts & Firebase -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.google-analytics.com">
  <link rel="dns-prefetch" href="https://firebaseinstallations.googleapis.com">

  <!-- Google Fonts (loaded via link instead of CSS @import for performance) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" crossorigin="anonymous">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Skip to Content Link (Accessibility) -->
  <a href="#chat-input" class="skip-link" id="skip-link">Skip to chat input</a>

  <!-- Animated Background -->
  <div class="bg-canvas" aria-hidden="true"></div>

  <!-- App Shell -->
  <div class="app">

    <!-- Header -->
    <header class="header" role="banner">
      <div class="header__logo" aria-hidden="true">🗳️</div>
      <div class="header__info">
        <h1 class="header__title">CivicGuide AI</h1>
        <p class="header__subtitle">Your Personal Voting Assistant</p>
      </div>
      <span class="header__badge" aria-label="Secure and neutral assistant">🔒 Secure &amp; Neutral</span>
    </header>

    <!-- Chat -->
    <main class="chat" aria-roledescription="Chat assistant">
      <!-- Screen-reader live region for announcements -->
      <div id="sr-announcements" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

      <!-- Messages -->
      <div class="chat__messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat messages" aria-relevant="additions">
        <!-- Messages are rendered dynamically -->
      </div>

      <!-- Input Area -->
      <div class="chat__input-area">
        <div class="chat__input-wrapper">
          <label for="chat-input" class="sr-only">Type your message</label>
          <input 
            type="text" 
            id="chat-input" 
            class="chat__input" 
            placeholder="Type your message..." 
            autocomplete="off"
            maxlength="500"
            aria-label="Type your message to the voting assistant"
            aria-describedby="input-hint"
            enterkeyhint="send"
            spellcheck="true"
          >
          <span id="input-hint" class="sr-only">Press Enter to send or click the Send button</span>
          <button 
            id="send-btn" 
            class="chat__send-btn" 
            aria-label="Send message"
            title="Send message"
            type="button"
          >
            <span aria-hidden="true">➤</span>
          </button>
        </div>
      </div>
    </main>

    <!-- Disclaimer -->
    <footer class="disclaimer" role="contentinfo">
      🔒 No data is collected or stored. Always verify deadlines with your local election authority.
    </footer>

  </div>

  <!-- NoScript Fallback (Accessibility) -->
  <noscript>
    <div style="padding:2rem;text-align:center;color:#f1f0ff;background:#0a0a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;">
      <div>
        <h1>CivicGuide AI</h1>
        <p>This application requires JavaScript to run. Please enable JavaScript in your browser settings to use the voting assistant.</p>
        <p>In the meantime, you can check your voter registration at <a href="https://vote.org" style="color:#818cf8;">vote.org</a>.</p>
      </div>
    </div>
  </noscript>

  <!-- Firebase SDK (Google Services — Analytics + Performance) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-performance-compat.js" crossorigin="anonymous"></script>

  <!-- Scripts (order matters: data → security → utils → analytics → chatbot → app) -->
  <script src="js/data.js?v=4"></script>
  <script src="js/security.js?v=4"></script>
  <script src="js/utils.js?v=4"></script>
  <script src="js/analytics.js?v=4"></script>
  <script src="js/chatbot.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
